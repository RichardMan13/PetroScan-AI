version: '3.8'

services:
  # DATABASE: PostgreSQL with pgvector (pg16/pgvector16)
  db:
    image: pgvector/pgvector:16-pg16
    container_name: petroscan_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petroscan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petroscan_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-petroscan_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petroscan_admin} -d ${POSTGRES_DB:-petroscan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MESSAGING: RabbitMQ with Management/UI
  rabbitmq:
    image: rabbitmq:3-management
    container_name: petroscan_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_UI_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 20s
      timeout: 10s
      retries: 5

  # STORAGE: MinIO (S3-compatible)
  minio:
    image: minio/minio
    container_name: petroscan_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-petroscan_root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-petroscan_secret_key}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_UI_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLOPS: MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: petroscan_mlflow
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-petroscan_root}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-petroscan_secret_key}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-petroscan_admin}:${POSTGRES_PASSWORD:-petroscan_secure_pwd}@db:5432/${POSTGRES_DB:-petroscan_db}
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000

volumes:
  postgres_data:
  rabbitmq_data:
  rabbitmq_logs:
  minio_data:
