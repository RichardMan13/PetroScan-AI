services:
  # DATABASE: PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: petroscan_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petroscan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petroscan_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-petroscan_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petroscan_admin} -d ${POSTGRES_DB:-petroscan_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MESSAGING: Redis Broker
  redis:
    image: redis:alpine
    container_name: petroscan_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # STORAGE: MinIO (S3-compatible)
  minio:
    image: minio/minio
    container_name: petroscan_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-petroscan_root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-petroscan_secret_key}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_UI_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLOPS: MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: petroscan_mlflow
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-petroscan_root}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-petroscan_secret_key}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    command: >
      mlflow server --backend-store-uri postgresql://${POSTGRES_USER:-petroscan_admin}:${POSTGRES_PASSWORD:-petroscan_secure_pwd}@db:5432/${POSTGRES_DB:-petroscan_db} --default-artifact-root s3://mlflow-artifacts/ --host 0.0.0.0 --port 5000

  # WORKER: Ingestion (Docling)
  ingestion_worker:
    build: .
    container_name: petroscan_ingestion
    command: python workers/ingestion_worker.py
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      AWS_ENDPOINT_URL: http://minio:9000
      POSTGRES_USER: ${POSTGRES_USER:-petroscan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petroscan_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-petroscan_db}
      POSTGRES_PORT: 5432
      HF_TOKEN: ${HUGGINGFACE_API_KEY}

    volumes:
      - .:/app

  # WORKER: Embedding (Sentence-Transformers)
  embedding_worker:
    build: .
    container_name: petroscan_embedding
    command: python workers/embedding_worker.py
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      AWS_ENDPOINT_URL: http://minio:9000
      POSTGRES_USER: ${POSTGRES_USER:-petroscan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petroscan_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-petroscan_db}
      POSTGRES_PORT: 5432
      MLFLOW_TRACKING_URI: http://mlflow:5000
      HF_TOKEN: ${HUGGINGFACE_API_KEY}

    volumes:
      - .:/app

  # WORKER: Layout (LayoutLMv3 + Tesseract)
  layout_worker:
    build: .
    container_name: petroscan_layout
    command: python workers/layout_worker.py
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      AWS_ENDPOINT_URL: http://minio:9000
      POSTGRES_USER: ${POSTGRES_USER:-petroscan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petroscan_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-petroscan_db}
      POSTGRES_PORT: 5432
      MLFLOW_TRACKING_URI: http://mlflow:5000
      HF_TOKEN: ${HUGGINGFACE_API_KEY}

    volumes:
      - .:/app

  # WORKER: Inventory (Pandas)
  inventory_worker:
    build: .
    container_name: petroscan_inventory
    command: python workers/inventory_worker.py
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      AWS_ENDPOINT_URL: http://minio:9000
      POSTGRES_USER: ${POSTGRES_USER:-petroscan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petroscan_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-petroscan_db}
      POSTGRES_PORT: 5432

    volumes:
      - .:/app

  # INTERFACE: Streamlit UI
  ui:
    build: .
    container_name: petroscan_ui
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      db: { condition: service_healthy }
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      AWS_ENDPOINT_URL: http://minio:9000
      POSTGRES_USER: ${POSTGRES_USER:-petroscan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petroscan_secure_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-petroscan_db}
      POSTGRES_PORT: 5432
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
  minio_data:
